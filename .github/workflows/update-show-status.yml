name: 📺 Update Show Status

on:
  schedule:
    # Every Monday at 3:00 AM CET/CEST
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  update-show-status:
    name: ⬣ Update Show Status
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: 🛠 Setup vp
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: ✨ Update Show Status
        run: vp run update:show:status
        env:
          NODE_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SESSION_SECRET: "unused"
          FLIPT_URL: ${{ vars.FLIPT_URL }}
          FLIPT_TOKEN: ${{ secrets.FLIPT_TOKEN }}
          FLIPT_ENVIRONMENT: ${{ vars.FLIPT_ENVIRONMENT }}
