name: 🗄️ Database Migrations
on:
  push:
    branches:
      - main
    paths:
      - "prisma/migrations/**"
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch name to checkout"
        required: true
        default: "main"
        type: string
      database_url:
        description: "Database URL to run migrations against"
        required: true
        type: string
permissions:
  contents: read

jobs:
  migrate:
    name: 🔄 Run Database Migrations
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch || 'main' }}

      - name: 🛠 Setup vp
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
        env:
          DATABASE_URL: ${{ inputs.database_url || secrets.DATABASE_URL }}

      - name: 🗄️ Run Prisma Migrations
        run: vp exec prisma migrate deploy
        env:
          DATABASE_URL: ${{ inputs.database_url || secrets.DATABASE_URL }}
