name: 🚀 Test
on:
  push:
    branches:
      - main
  pull_request: {}
permissions:
  actions: write
  contents: read

jobs:
  lint:
    name: ⬣ Format & ESLint
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: 📥 Download deps
        run: pnpm install --frozen-lockfile
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db

      - name: 📄 Check format
        run: pnpm run format:check

      - name: 🔬 Lint
        run: pnpm run lint

  typecheck:
    name: ʦ TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: 📥 Download deps
        run: pnpm install --frozen-lockfile
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db

      - name: 🔎 Type check
        run: pnpm run typecheck

  vitest:
    name: ⚡ Vitest
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: 📥 Download deps
        run: pnpm install --frozen-lockfile
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db

      - name: 🌳 Install Playwright browsers
        run: pnpm exec playwright install

      - name: ⚡ Run vitest
        run: pnpm run test

      - name: ⬆️ Upload screenshot test failures
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: vitest-screenshot-failures
          path: .vitest-attachments/
          retention-days: 30

  playwright:
    name: ⚫️ Playwright
    runs-on: ubuntu-latest
    container: node:24

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_DB: default
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: 🏄 Copy test env vars
        run: cp .env.example .env

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 📥 Download deps
        run: pnpm install --frozen-lockfile
        env:
          DATABASE_URL: postgresql://postgres:postgres@postgres:5432/default?sslmode=disable

      - name: 🛠 Setup Database
        run: pnpm exec prisma db push
        env:
          DATABASE_URL: postgresql://postgres:postgres@postgres:5432/default?sslmode=disable

      - name: 🌱 Seed the Database
        run: pnpm exec prisma db seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@postgres:5432/default?sslmode=disable

      - name: ⚙️ Build
        run: pnpm run build

      - name: 🌳 Run Playwright tests
        run: pnpm exec playwright install --with-deps && pnpm run test:e2e:run
        env:
          HOME: /root
          DATABASE_URL: postgresql://postgres:postgres@postgres:5432/default?sslmode=disable

      - name: ⬆️ Upload artifacts
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
