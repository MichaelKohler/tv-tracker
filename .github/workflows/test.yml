name: 🚀 Test
on:
  push:
    branches:
      - main
  pull_request: {}
permissions:
  actions: write
  contents: read

jobs:
  check:
    name: ⬣ vp check
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: 🛠 Setup vp
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db

      - name: 🔬 Check
        run: vp check

  vitest:
    name: ⚡ Vitest
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: 🛠 Setup vp
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db

      - name: 🌳 Install Playwright browsers
        run: vp exec playwright install --with-deps chromium firefox

      - name: ⚡ Run vitest
        run: vp test --run

      - name: ⬆️ Upload screenshot test failures
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: vitest-screenshot-failures
          path: .vitest-attachments/
          include-hidden-files: true
          retention-days: 30

  playwright:
    name: ⚫️ Playwright
    runs-on: ubuntu-latest
    container: node:24

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_DB: default
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: 🏄 Copy test env vars
        run: cp .env.example .env

      - name: 🛠 Setup vp
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
        env:
          DATABASE_URL: postgresql://postgres:postgres@postgres:5432/default?sslmode=disable

      - name: 🛠 Setup Database
        run: vp exec prisma db push
        env:
          DATABASE_URL: postgresql://postgres:postgres@postgres:5432/default?sslmode=disable

      - name: 🌱 Seed the Database
        run: vp exec prisma db seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@postgres:5432/default?sslmode=disable

      - name: ⚙️ Build
        run: vp build
        env:
          DATABASE_URL: postgresql://postgres:postgres@postgres:5432/default?sslmode=disable

      - name: 🌳 Install Playwright browsers
        run: vp exec playwright install --with-deps chromium firefox
        env:
          HOME: /root

      - name: 🚀 Start server
        run: vp run start > /tmp/server.log 2>&1 &
        env:
          HOME: /root
          DATABASE_URL: postgresql://postgres:postgres@postgres:5432/default?sslmode=disable
          PORT: 5173
          SESSION_SECRET: super-duper-s3cret
          NODE_ENV: production
          FLIPT_URL: ""
          FLIPT_TOKEN: ""
          FLIPT_ENVIRONMENT: ""

      - name: ⏳ Wait for server
        run: vp exec wait-on http://localhost:5173 --timeout 30000

      - name: 📋 Server startup log
        if: failure()
        run: cat /tmp/server.log

      - name: 🎭 Run Playwright tests
        run: vp run test:e2e:run
        env:
          HOME: /root
          DATABASE_URL: postgresql://postgres:postgres@postgres:5432/default?sslmode=disable

      - name: ⬆️ Upload artifacts
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
